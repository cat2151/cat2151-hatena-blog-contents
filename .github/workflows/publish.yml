name: Publish to Hatena Blog

on:
  push:
    branches:
      - main
    paths:
      - "posts/**.md"

jobs:
  publish:
    runs-on: ubuntu-latest
    # skip commits made by this workflow itself
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    permissions:
      contents: write  # needed to push entry_id back to markdown

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Publish posts
        env:
          HATENA_ID: ${{ secrets.HATENA_ID }}
          HATENA_API_KEY: ${{ secrets.HATENA_API_KEY }}
          BLOG_DOMAIN: ${{ secrets.BLOG_DOMAIN }}
        run: python scripts/publish.py

      - name: Commit updated entry IDs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/
          # only commit if there are changes (= new entries were created)
          git diff --cached --quiet || git commit -m "chore: update hatena_entry_id [skip ci]"
          git push
